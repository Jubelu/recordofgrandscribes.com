<style>

@media screen and (max-width: 768px) {

    tr {
        display: block;
    }

    td {
        display: block;
        width: 100% !important;
    }

    .header {
        font-size: 36px !important;
        height: auto !important;
        padding: 40px 20px;
    }

    .dropdown-content {
        width: 100%;
        left: 0;
    }

    p, div, td {
        font-size: 16px !important;
        line-height: 1.6;
    }
}
    
html, body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

/* TABLE LAYOUT FIX */
table {
    width: 100%;
    border-collapse: collapse;
    background-image: url('xuanthu2.jpg');
}

td, th {
    padding: 12px;
    vertical-align: top;
    font-family: "Calibri", "Kaiti TC";
    font-size: 18px;
}

/* HEADER */
.header {
    background-color: #d1d1d1;
    font-size: 50px;
    text-align: center;
}

/* SECTION TITLE */
.section-title {
    background-color: #E8E3C3;
    text-align: center;
    font-size: 20px;
}

/* COLLAPSIBLE FIX */
details {
    width: 100%;
}

details > div {
    border: 1px solid #ccc;
    padding: 10px;
    margin-top: 5px;
    box-sizing: border-box;
    overflow-wrap: break-word;
}

/* TEXT */
p {
    margin: 8px 0;
    text-align: justify;
}

.hero-banner {
    width: 100%;
    min-height: 40vh;

    background-image: url('xuanthu.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    align-items: center;
    justify-content: center;

    padding: 40px 20px;
}

.hero-title {
    font-family: 'Ma Shan Zheng', cursive;
    color: white;

    font-size: clamp(32px, 7vw, 80px);

    text-align: center;

    text-shadow: 2px 2px 10px rgba(0,0,0,0.8);

    line-height: 1.2;
}
.dropdown-td {
    position: relative !important; /* This is the anchor */
}

.dropdown-content {
    display: none;
    position: absolute; /* Changed from relative to absolute */
    width: 200px;
    background-color: #6E5945;
    box-shadow: 0px 8px 16px rgba(0,0,0,0.3);
    z-index: 100;
    left: 0;
    top: 100%;
    
    /* ADDED: This handles the long list of chapters */
    max-height: 400px; 
    overflow-y: auto; 
    
    padding-top: 12px; 
    color: #FFFFFF;
    text-align: left;
    font-family: sans-serif;
    line-height: 1.2;
}

/* Treat the first line of text as a header */
.dropdown-content {
    font-size: 12px;
    letter-spacing: 1px;
    /* This ensures "CHƯƠNG 1" has the same left-alignment as the links */
    text-indent: 16px; 
}

/* Style the links so they look like buttons */
.dropdown-content a {
    color: white;
    padding: 10px 16px;
    text-decoration: none;
    display: block;
    font-weight: normal;
    font-size: 14px;
    text-indent: 0; /* Reset the indent from the parent */
    transition: background 0.2s;
    }

/* A subtle hover that doesn't clash with brown */
.dropdown-content a:hover {
    background-color: rgba(255, 255, 255, 0.1);
}

/* Show menu */
.dropdown-td:hover .dropdown-content {
    display: block;
}

/* Clean up the separator */
.dropdown-content hr {
    border: 0;
    border-top: 1px solid rgba(255, 255, 255, 0.1) !important;
    margin: 5px 0;
}
    
.hero-section {
    position: relative;

    width: 100%;
    min-height: 300px;

    background-image: url('xuanthu.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    display: flex;
    align-items: center;
    justify-content: center;

    overflow: visible;
}

/* dark overlay */
.hero-section::before {
    content: "";

    position: absolute;
    inset: 0;

    background: rgba(0,0,0,0.25);

    z-index: 1;
}

/* content stays above overlay */
.hero-content {
    position: relative;
    z-index: 2;

    width: 100%;
    text-align: center;
}

/* title */
.hero-title {
    font-family: 'Ma Shan Zheng', cursive;
    color: white;

    font-size: clamp(32px, 7vw, 80px);

    text-shadow: 2px 2px 10px rgba(0,0,0,0.8);

    padding: 20px;
}

/* mobile fix */
@media screen and (max-width: 768px) {

    .hero-section {
        min-height: 220px;

        background-position: center center;
    }

    .hero-title {
        font-size: clamp(28px, 8vw, 42px);
        line-height: 1.2;
    }

    .dropdown-content {
        width: 100%;
        max-width: 100vw;
        left: 0;
    }
}

</style>
</head>
